<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Register - IndiaTour</title>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">IndiaTour</a>
  </div>
</nav>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card shadow-sm border-0">
          <div class="card-body p-5">

            <h2 class="fw-bold text-center">Create Account</h2>

            <!-- INPUTS -->
            <input id="fname" class="form-control mb-3" placeholder="First Name">
            <input id="lname" class="form-control mb-3" placeholder="Last Name">
            <input id="email" class="form-control mb-3" placeholder="Email">
            <input id="phone" class="form-control mb-3" placeholder="Phone">
            <input id="password" type="password" class="form-control mb-3" placeholder="Password">
            <input id="confirm" type="password" class="form-control mb-3" placeholder="Confirm Password">

            <button onclick="registerUser()" class="btn btn-warning w-100 fw-bold">
              Create Account
            </button>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<script>
async function registerUser(){

  const fname = document.getElementById("fname").value;
  const lname = document.getElementById("lname").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  // VALIDATION
  if(fname === "" || email === "" || password === ""){
    alert("Please fill required fields");
    return;
  }

  if(password !== confirm){
    alert("Passwords do not match");
    return;
  }

  const data = { fname, lname, email, phone, password };

  try {
    const res = await fetch("http://localhost:5000/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    alert("Registered successfully ✅");

    // SAVE LOGIN STATE
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("username", fname);

    // REDIRECT
    window.location.href = "index.html";

  } catch(err){
    alert("Error connecting to server ❌");
    console.log(err);
  }
}
</script>

</body>
</html>
