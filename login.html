<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Login - IndiaTour</title>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">IndiaTour</a>
  </div>
</nav>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <div class="card shadow-sm border-0">
          <div class="card-body p-5">

            <h2 class="fw-bold text-center mb-4">Login</h2>

            <!-- INPUTS -->
            <input id="email" class="form-control mb-3" placeholder="Email">
            <input id="password" type="password" class="form-control mb-4" placeholder="Password">

            <button onclick="loginUser()" class="btn btn-dark w-100">
              Login
            </button>

            <div class="text-center mt-3">
              <small>Don't have an account?</small>
              <a href="register.html">Register</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<script>
async function loginUser(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(email === "" || password === ""){
    alert("Please fill all fields");
    return;
  }

  try{
    const res = await fetch("http://localhost:5000/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const result = await res.json();

    if(res.status === 200){
      alert("Login successful ");

      // SAVE LOGIN STATE
      localStorage.setItem("loggedIn", "true");
      localStorage.setItem("username", result.user.fname);

      window.location.href = "index.html";
    } else {
      alert(result.msg || "Invalid credentials ");
    }

  }catch(err){
    alert("Server error ");
    console.log(err);
  }
}
</script>

</body>
</html>
