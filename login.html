<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Login - IndiaTour</title>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">IndiaTour</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarMenu">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="states.html">States</a></li>
        <li class="nav-item"><a class="nav-link" href="places.html">Places</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
      <div class="d-flex ms-lg-3 gap-2">
        <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
        <a href="register.html" class="btn btn-warning btn-sm">Register</a>
      </div>
    </div>
  </div>
</nav>

<!-- Login Card -->
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-5">

            <h2 class="fw-bold text-center mb-1">Welcome Back</h2>
            <p class="text-muted text-center mb-4">Login to your IndiaTour account</p>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <input type="email" class="form-control" placeholder="you@example.com">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control" placeholder="Enter your password">
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-dark small">Forgot password?</a>
            </div>

            <button class="btn btn-dark w-100 mb-3">Login</button>

            <div class="text-center">
              <span class="text-muted small">Don't have an account? </span>
              <a href="register.html" class="text-dark fw-semibold small">Register here</a>
            </div>

            <hr class="my-4">

            <button class="btn btn-outline-dark w-100 mb-2">🔵 Continue with Google</button>
            <button class="btn btn-outline-dark w-100">🔷 Continue with Facebook</button>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="bg-dark text-light text-center py-3">
  <p class="mb-0">© 2026 IndiaTour</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
