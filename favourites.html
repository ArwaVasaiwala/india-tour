  shimla: { name: "Shimla", img: "images/shimla.jpg.jpeg" },

  udaipur: { name: "Udaipur", img: "images/udaipur.jpeg" },
  andaman: { name: "Andaman", img: "images/andaman.jpeg" },
  rishikesh: { name: "Rishikesh", img: "images/rishikesh.jpeg" },
  ladakh: { name: "Leh Ladakh", img: "images/ladakh.jpeg" },

};
  // add all places here
};

async function loadFavorites(){
  const userId = localStorage.getItem("userId");

  const res = await fetch(`http://localhost:5000/api/favorites/${userId}`);
  const data = await res.json();

  const container = document.getElementById("favContainer");

  data.forEach(id => {
    const p = placesData[id];

    container.innerHTML += `
      <div class="col-md-4">
        <div class="card shadow">
          <img src="${p.img}" style="height:200px;object-fit:cover;">
          <div class="card-body">
            <h5>${p.name}</h5>
          </div>
        </div>
      </div>
    `;
  });
}

loadFavorites();
<script>
function updateNavbar(){
  const isLoggedIn = localStorage.getItem("loggedIn");
  const navButtons = document.getElementById("authButtons");

  if(isLoggedIn){
    const username = localStorage.getItem("username");

    navButtons.innerHTML = `
      <span class="text-white me-2">Hi, ${username}</span>
      <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
    `;
  }
}

function logout(){
  localStorage.removeItem("loggedIn");
  localStorage.removeItem("username");
  window.location.href = "index.html";
}

updateNavbar();

</script>
